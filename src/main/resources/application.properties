
#  Zorvyn Finance Backend - Application Configuration

spring.application.name=finance-backend

# DataSource — Replace <YOUR_CLOUD_POSTGRES_URL> with your URL
# Format: jdbc:postgresql://<host>:<port>/<dbname>
# YOUR_DB_URL = jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?prepareThreshold=0
# YOUR_DB_USERNAME = postgres.pompmxepdhrjkhdajjlj
# YOUR_DB_PASSWORD = bX3jfpAQ3aKZfCHX

spring.datasource.url=YOUR_DB_URL
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT Configuration
# YOUR_SUPER_SECRET_KEY = 08ec83fa34324e9ddd3935124b98bd0044f51090d230ac7a20b96995738dad9b

app.jwt.secret=${JWT_SECRET:YOUR_SUPER_SECRET_KEY}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# 86400000 ms = 24 hours

# Server

server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# SpringDoc / Swagger UI

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging

logging.level.com.zorvyn=DEBUG
logging.level.org.springframework.security=WARN
